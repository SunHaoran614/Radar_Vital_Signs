name: CI
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          activate-environment: radar
          environment-file: environment.yml
          use-mamba: true

      - name: Lint
        shell: bash -l {0}
        run: ruff check .

      - name: Tests
        shell: bash -l {0}
        run: pytest -q
